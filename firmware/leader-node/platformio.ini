; Leader node — tentatively ESP32-C3 DevKit (WROOM-32 mentioned as fallback).
;
; One per zone (and one backup per zone for bully-election purposes).
; Runs ESP-NOW (to sensors) and WiFi STA (to backend) on the same radio —
; see radio_scheduler.c for the time-sharing strategy.

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = espidf

build_src_filter = +<*> +<../../shared/*>
build_flags =
    -I../shared
    -DPROTOCOL_VERSION=1
    -DLEADER_CHIP_C3=1

monitor_speed = 115200
upload_speed = 921600

lib_deps =
    knolleary/PubSubClient@^2.8
