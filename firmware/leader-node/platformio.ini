; Leader node — ESP32-C3 DevKit. (C5 also fine; bump board target.)
;
; One per zone (and one backup per zone for bully). Runs ESP-NOW (sensors)
; and WiFi STA (backend) on the same radio — see radio_scheduler.c.
;
; MQTT and HTTP clients are built-in components of esp-idf (esp-mqtt,
; esp_http_client). No external libraries required.

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = espidf

build_src_filter = +<*> +<../../shared/*>
build_flags =
    -I../shared
    -DPROTOCOL_VERSION=1
    -DLEADER_CHIP_C3=1

monitor_speed = 115200
upload_speed = 921600
