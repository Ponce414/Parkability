; Sensor node — ESP32-C3 Super Mini
;
; One of these per parking spot. Polls a VL53L0X over I2C and sends state
; changes over ESP-NOW to the zone leader.

[env:esp32-c3-supermini]
platform = espressif32
board = esp32-c3-devkitm-1
framework = espidf

; Shared code lives one level up.
build_src_filter = +<*> +<../../shared/*>
build_flags =
    -I../shared
    -DPROTOCOL_VERSION=1

monitor_speed = 115200
upload_speed = 921600

; VL53L0X Time-of-Flight sensor library.
; Pololu's variant is the de-facto VL53L0X library for ESP-IDF-style builds.
lib_deps =
    pololu/VL53L0X@^1.3.1
